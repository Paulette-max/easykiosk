<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EasyKiosk — Static Dashboard</title>
    <style>
      :root{--bg:#f7fafc;--card:#fff;--muted:#6b7280}
      body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;background:var(--bg);color:#111}
      .container{max-width:1100px;margin:28px auto;padding:16px}
      h1{margin:0 0 12px}
      .cards{display:flex;gap:12px;margin-bottom:18px}
      .card{background:var(--card);border:1px solid #e5e7eb;padding:14px;border-radius:8px;flex:1;box-shadow:0 1px 2px rgba(0,0,0,0.03)}
      .card small{color:var(--muted)}
      table{width:100%;border-collapse:collapse;background:var(--card);border-radius:6px;overflow:hidden}
      th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eef2f7}
      thead th{background:#f3f4f6;color:#111;font-weight:600}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Prototype Dashboard</h1>

      <div class="cards" id="summary"></div>

      <h2>Recent Orders</h2>
      <table id="orders">
        <thead><tr><th>ID</th><th>Customer</th><th>Total</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      // sample data for static preview
      const summary = { users: 12, orders: 34, revenue: 1284.5 };
      const recent = [
        { id: 101, customer: 'Alice', total: 19.99 },
        { id: 102, customer: 'Bob', total: 45.5 },
        { id: 103, customer: 'Carol', total: 12.0 }
      ];

      const sumEl = document.getElementById('summary');
      for (const [k,v] of Object.entries(summary)){
        const div = document.createElement('div'); div.className='card';
        div.innerHTML = `<small>${k.toUpperCase()}</small><div style="font-size:20px;margin-top:6px">${k==='revenue' ? '$'+v.toFixed(2) : v}</div>`;
        sumEl.appendChild(div);
      }

      const tbody = document.querySelector('#orders tbody');
      for (const r of recent){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.id}</td><td>${r.customer}</td><td>$${r.total.toFixed(2)}</td>`;
        tbody.appendChild(tr);
      }
    </script>
  </body>
</html>
